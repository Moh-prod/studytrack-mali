<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyTrack Mali Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
:root {
  --primary:#4CAF50;
  --bg:#f4f6f9;
}

body {
  font-family: 'Segoe UI', Arial;
  background: var(--bg);
  margin:0;
}

.container {
  max-width:600px;
  margin:auto;
  padding:15px;
}

.card {
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  margin-bottom:20px;
  animation: fadeIn 0.5s ease;
}

h2, h3 { text-align:center; }

input, select, button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}

input:focus {
  outline:none;
  border:2px solid var(--primary);
}

button {
  background:var(--primary);
  color:white;
  border:none;
  cursor:pointer;
  transition:0.2s;
}

button:hover { transform:scale(1.05); }

li {
  list-style:none;
  background:#fff;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  display:flex;
  flex-direction:column;
}

.task-top {
  display:flex;
  justify-content:space-between;
}

.actions button {
  width:auto;
  padding:5px 10px;
}

.done { text-decoration:line-through; color:gray; }
.hide { display:none; }

#stats {
  margin-top:15px;
  text-align:center;
  font-weight:bold;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);} 
  to {opacity:1; transform:translateY(0);} 
}
</style>
</head>

<body>
<div class="container">

<div id="auth" class="card">
<h3>Connexion</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Connexion</button>
<button onclick="signup()">Créer compte</button>
<div id="auth-error" style="color:red;text-align:center"></div>
</div>

<div id="todo" class="card hide">
<h2>📚 StudyTrack Mali</h2>

<input id="taskInput" placeholder="Ajouter une tâche">
<input type="date" id="dateInput">
<button onclick="addTask()">Ajouter</button>

<select id="filter" onchange="render()">
<option value="all">Toutes</option>
<option value="done">Terminées</option>
<option value="pending">En cours</option>
</select>

<ul id="taskList"></ul>
<div id="stats"></div>

<button onclick="logout()" style="background:red">Déconnexion</button>
</div>

</div>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyCRXQYiWlIaZi3Mmkf1Zqy2TVfCCL8IdaA",
 authDomain: "studytrack-mali.firebaseapp.com",
 projectId: "studytrack-mali"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const authDiv = document.getElementById("auth");
const todoDiv = document.getElementById("todo");
const taskList = document.getElementById("taskList");
const stats = document.getElementById("stats");

let tasks = [];

function signup(){
 auth.createUserWithEmailAndPassword(email.value, password.value)
 .catch(e=>authError(e.message));
}

function login(){
 auth.signInWithEmailAndPassword(email.value, password.value)
 .catch(e=>authError(e.message));
}

function logout(){ auth.signOut(); }

function authError(msg){
 document.getElementById("auth-error").innerText = msg;
}

function addTask(){
 const user = auth.currentUser;
 if(!user) return;

 if(tasks.length >= 5){
   alert("Limite gratuite atteinte (5 tâches)");
   return;
 }

 db.collection("tasks").add({
   uid:user.uid,
   text:taskInput.value,
   date:dateInput.value,
   done:false,
   notified:false
 });

 taskInput.value="";
}

function del(i){
 db.collection("tasks").doc(tasks[i]._id).delete();
}

function toggle(i){
 db.collection("tasks").doc(tasks[i]._id).update({done:!tasks[i].done});
}

auth.onAuthStateChanged(user=>{
 if(user){
   authDiv.classList.add("hide");
   todoDiv.classList.remove("hide");

   db.collection("tasks").where("uid","==",user.uid)
   .onSnapshot(s=>{
     tasks=[];
     s.forEach(doc=>{
       let d=doc.data();
       d._id=doc.id;
       tasks.push(d);
     });
     render();
   });
 }
 else{
   authDiv.classList.remove("hide");
   todoDiv.classList.add("hide");
 }
});

function render(){
 taskList.innerHTML="";

 const filter = document.getElementById("filter").value;
 const today = new Date().toISOString().split("T")[0];

 tasks.forEach((t,i)=>{

 if(filter=="done" && !t.done) return;
 if(filter=="pending" && t.done) return;

 let color = t.date < today && !t.done ? "red":"black";

 const li=document.createElement("li");
 li.innerHTML=`
 <div class="task-top">
 <span class="${t.done?'done':''}" style="color:${color}">${t.text}</span>
 <div class="actions">
 <button onclick="toggle(${i})">✔</button>
 <button onclick="del(${i})">X</button>
 </div>
 </div>
 <small>${t.date}</small>`;

 taskList.appendChild(li);
 });

 const total = tasks.length;
 const done = tasks.filter(t=>t.done).length;
 stats.innerHTML = `${done} / ${total} tâches terminées`;
}

if ("Notification" in window) {
 Notification.requestPermission();

 setInterval(()=>{
   const today = new Date().toISOString().split("T")[0];
   tasks.forEach(t=>{
     if(t.date===today && !t.notified){
       new Notification("StudyTrack",{body:t.text});
       db.collection("tasks").doc(t._id).update({notified:true});
     }
   });
 },60000);
}
</script>

</body>
</html>
