<!DOCTYPE html>
<html lang="fr">
<head>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyTrack Mali - Niveau 3</title>

<style>
:root {
  --primary:#4CAF50;
  --bg:#f4f6f9;
}

body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  margin:0;
}

.container {
  max-width:600px;
  margin:auto;
  padding:15px;
}

.card {
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2 {
  text-align:center;
}

input, button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}

button {
  background:var(--primary);
  color:white;
  border:none;
}

ul { padding:0; }

li {
  list-style:none;
  background:#fff;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  gap:5px;
}

.task-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.actions button {
  width:auto;
  padding:5px 10px;
  margin-left:5px;
}

.done { text-decoration: line-through; color:gray; }

@media(max-width:600px){
  .container { padding:10px; }
}
</style>
</head>

<body>
<div class="container">
  <div class="card">
    <h2>📚 StudyTrack Mali</h2>

    <input id="taskInput" placeholder="Ajouter une tâche">
    <input type="date" id="dateInput">
    <button onclick="addTask()">Ajouter</button>

    <ul id="taskList"></ul>
  </div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCRXQYiWlIaZi3Mmkf1Zqy2TVfCCL8IdaA",
  authDomain: "studytrack-mali.firebaseapp.com",
  projectId: "studytrack-mali",
  storageBucket: "studytrack-mali.firebasestorage.app",
  messagingSenderId: "62559775116",
  appId: "1:62559775116:web:c73319b73905b3fc56cea9",
  measurementId: "G-GSM74L3EPE"
};

const app = firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function addTask(){
  const user = auth.currentUser;

  db.collection("tasks").add({
    uid: user.uid,
    text: taskInput.value,
    date: dateInput.value
  });
}

function signup(email, password){
  auth.createUserWithEmailAndPassword(email, password)
    .then(()=> alert("Compte créé"))
    .catch(err=> alert(err.message));
}

function login(email, password){
  auth.signInWithEmailAndPassword(email, password)
    .then(()=> alert("Connecté"))
    .catch(err=> alert(err.message));
}

auth.onAuthStateChanged(user => {
  if(user){
    db.collection("tasks")
      .where("uid","==",user.uid)
      .onSnapshot(snapshot=>{
        tasks = [];
        snapshot.forEach(doc=>{
          tasks.push(doc.data());
        });
        render();
      });
  }
});

function render(){
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.sort((a,b)=> new Date(a.date)-new Date(b.date));

  const today = new Date().toISOString().split("T")[0];

  tasks.forEach((t,i)=>{
    const li = document.createElement("li");

    let color = t.date < today && !t.done ? "red" : "black";

    li.innerHTML = `
      <div class="task-top">
        <span class="${t.done ? 'done':''}" style="color:${color}">${t.text}</span>
        <div class="actions">
          <button onclick="toggle(${i})">✔</button>
          <button onclick="del(${i})">X</button>
        </div>
      </div>
      <small>${t.date}</small>
    `;

    list.appendChild(li);
  });
}

function addTask(){
  const text = taskInput.value;
  const date = dateInput.value;

  if(!text || !date){ alert("Remplis tout"); return; }

  tasks.push({text, date, done:false});
  taskInput.value="";
  dateInput.value="";
  save();
  render();
}

function del(i){
  tasks.splice(i,1);
  save();
  render();
}

function toggle(i){
  tasks[i].done = !tasks[i].done;
  save();
  render();
}

// Notification simple améliorée
setInterval(()=>{
  const today = new Date().toISOString().split("T")[0];
  tasks.forEach(t=>{
    if(t.date === today && !t.notified){
      alert("Aujourd'hui: " + t.text);
      t.notified = true;
      save();
    }
  });
}, 60000);

render();
</script>
</body>
</html>
