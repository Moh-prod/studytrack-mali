<!DOCTYPE html>
<html lang="fr">
<head>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyTrack Mali - Niveau 3</title>

<style>
:root {
  --primary:#4CAF50;
  --bg:#f4f6f9;
}

body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  margin:0;
}

.container {
  max-width:600px;
  margin:auto;
  padding:15px;
}

.card {
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2 {
  text-align:center;
}

input, button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}

button {
  background:var(--primary);
  color:white;
  border:none;
}

ul { padding:0; }

li {
  list-style:none;
  background:#fff;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  gap:5px;
}

.task-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.actions button {
  width:auto;
  padding:5px 10px;
  margin-left:5px;
}

.done { text-decoration: line-through; color:gray; }

@media(max-width:600px){
  .container { padding:10px; }
}
</style>
</head>

<body>
<div class="container">
  <div class="card">
    <h2>📚 StudyTrack Mali</h2>

    <input id="taskInput" placeholder="Ajouter une tâche">
    <input type="date" id="dateInput">
    <button onclick="addTask()">Ajouter</button>

    <ul id="taskList"></ul>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCRXQYiWlIaZi3Mmkf1Zqy2TVfCCL8IdaA",
  authDomain: "studytrack-mali.firebaseapp.com",
  projectId: "studytrack-mali",
  storageBucket: "studytrack-mali.firebasestorage.app",
  messagingSenderId: "62559775116",
  appId: "1:62559775116:web:c73319b73905b3fc56cea9",
  measurementId: "G-GSM74L3EPE"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let tasks = [];

function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  auth.createUserWithEmailAndPassword(email, password)
    .then(()=> alert("Compte créé"))
    .catch(err=> alert(err.message));
}

function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  auth.signInWithEmailAndPassword(email, password)
    .then(()=> alert("Connecté"))
    .catch(err=> alert(err.message));
}

function addTask(){
  const user = auth.currentUser;
  const text = document.getElementById("taskInput").value;
  const date = document.getElementById("dateInput").value;
  if(!text || !date) { alert("Remplis tout"); return; }
  db.collection("tasks").add({
    uid: user.uid,
    text,
    date,
    done: false,
    notified: false
  });
  document.getElementById("taskInput").value = "";
  document.getElementById("dateInput").value = "";
}

function del(i){
  const task = tasks[i];
  // Cherche le document correspondant
  db.collection("tasks")
    .where("uid", "==", auth.currentUser.uid)
    .where("text", "==", task.text)
    .where("date", "==", task.date)
    .get()
    .then(snapshot => {
      snapshot.forEach(doc => {
        doc.ref.delete();
      });
    });
}

function toggle(i){
  const task = tasks[i];
  db.collection("tasks")
    .where("uid", "==", auth.currentUser.uid)
    .where("text", "==", task.text)
    .where("date", "==", task.date)
    .get()
    .then(snapshot => {
      snapshot.forEach(doc => {
        doc.ref.update({ done: !task.done });
      });
    });
}

auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById("auth").style.display = "none";
    db.collection("tasks")
      .where("uid","==",user.uid)
      .onSnapshot(snapshot=>{
        tasks = [];
        snapshot.forEach(doc=>{
          let data = doc.data();
          data._docId = doc.id;
          tasks.push(data);
        });
        render();
      });
  } else {
    document.getElementById("auth").style.display = "block";
    tasks = [];
    render();
  }
});

function render(){
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  if (!auth.currentUser) {
    list.innerHTML = "<li>Connecte-toi pour voir tes tâches</li>";
    return;
  }

  tasks.sort((a,b)=> new Date(a.date)-new Date(b.date));
  const today = new Date().toISOString().split("T")[0];

  tasks.forEach((t,i)=>{
    const li = document.createElement("li");
    let color = t.date < today && !t.done ? "red" : "black";

    li.innerHTML = `
      <div class="task-top">
        <span class="${t.done ? 'done':''}" style="color:${color}">${t.text}</span>
        <div class="actions">
          <button onclick="toggle(${i})">✔</button>
          <button onclick="del(${i})">X</button>
        </div>
      </div>
      <small>${t.date}</small>
    `;
    list.appendChild(li);
  });
}

// Notification avec Firestore
setInterval(()=>{
  const today = new Date().toISOString().split("T")[0];
  tasks.forEach((t, i)=>{
    if(t.date === today && !t.notified){
      alert("Aujourd'hui: " + t.text);
      // On met à jour la notification
      db.collection("tasks")
        .where("uid", "==", auth.currentUser.uid)
        .where("text", "==", t.text)
        .where("date", "==", t.date)
        .get()
        .then(snapshot => {
          snapshot.forEach(doc => {
            doc.ref.update({ notified: true });
          });
        });
    }
  });
}, 60000);
</script>
</body>
</html>
